<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Verify OTP')}"></head>
<body class="eh-body auth-body">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="auth-wrapper">
  <div class="auth-card text-center">
    <div class="otp-icon">📬</div>
    <h2 class="auth-title">Check Your Email</h2>
    <p class="auth-sub text-muted">We sent a 6-digit OTP to your Gmail</p>

    <div th:if="${error}" class="alert eh-alert-error" th:text="${error}"></div>
    <div th:if="${success}" class="alert eh-alert-success" th:text="${success}"></div>

    <form th:action="@{/auth/verify-otp}" method="post" class="auth-form mt-4">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="email" th:value="${email}"/>

      <div class="mb-3">
        <label class="form-label auth-label">Email Address</label>
        <input type="email" name="email" class="form-control eh-input text-center"
               th:value="${email}" placeholder="yourname@gmail.com" required/>
      </div>

      <div class="mb-4">
        <label class="form-label auth-label">Enter OTP</label>
        <input type="text" name="otp" class="form-control eh-input text-center otp-input"
               placeholder="● ● ● ● ● ●" maxlength="6" required autocomplete="one-time-code"/>
      </div>

      <button type="submit" class="btn eh-btn-solid w-100 auth-submit">Verify Email</button>
    </form>

    <form th:action="@{/auth/resend-otp}" method="post" class="mt-3">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="email" th:value="${email}"/>
      <button type="submit" class="btn eh-btn-ghost w-100">Resend OTP</button>
    </form>
  </div>
</div>
</body>
</html>
