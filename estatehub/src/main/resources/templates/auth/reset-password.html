<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Reset Password')}"></head>
<body class="eh-body auth-body">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="text-center mb-4"><span style="font-size:2.5rem">🔑</span></div>
    <h2 class="auth-title text-center">Reset Password</h2>
    <p class="auth-sub text-muted text-center">Enter your new password below</p>

    <div th:if="${error}" class="alert eh-alert-error" th:text="${error}"></div>

    <form th:action="@{/auth/reset-password}" method="post" class="auth-form mt-4">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="token" th:value="${token}"/>

      <div class="mb-3">
        <label class="form-label auth-label">New Password</label>
        <div class="input-group eh-input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="newPassword" id="newPass" class="form-control eh-input"
                 placeholder="Min 6 characters" required minlength="6"/>
          <button type="button" class="input-group-text toggle-pass" onclick="togglePass('newPass')">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label auth-label">Confirm Password</label>
        <div class="input-group eh-input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="confirmPassword" id="confPass" class="form-control eh-input"
                 placeholder="Repeat password" required minlength="6"/>
        </div>
      </div>
      <button type="submit" class="btn eh-btn-solid w-100 auth-submit">Reset Password</button>
    </form>
  </div>
</div>
<script>
function togglePass(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
