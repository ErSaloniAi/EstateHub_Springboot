<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register')}"></head>
<body class="eh-body auth-body">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="auth-wrapper">
  <div class="auth-card" style="max-width:520px">
    <div class="auth-logo">
      <a th:href="@{/}" class="eh-brand text-decoration-none">
        <span class="brand-icon">⬡</span>
        <span class="brand-text">ESTATE<strong>HUB</strong></span>
      </a>
    </div>
    <h2 class="auth-title">Create Account</h2>
    <p class="auth-sub text-muted">Join Gujarat's premier real estate platform</p>

    <div th:if="${error}" class="alert eh-alert-error" th:text="${error}"></div>

    <form th:action="@{/auth/register}" method="post" th:object="${registerRequest}" class="auth-form">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="form-label auth-label">First Name</label>
          <input type="text" th:field="*{firstName}" class="form-control eh-input"
                 placeholder="Saloni" required/>
          <div class="text-danger small mt-1" th:if="${#fields.hasErrors('firstName')}"
               th:errors="*{firstName}"></div>
        </div>
        <div class="col-6">
          <label class="form-label auth-label">Last Name</label>
          <input type="text" th:field="*{lastName}" class="form-control eh-input"
                 placeholder="Gorsiya" required/>
          <div class="text-danger small mt-1" th:if="${#fields.hasErrors('lastName')}"
               th:errors="*{lastName}"></div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label auth-label">Gmail Address</label>
        <div class="input-group eh-input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" th:field="*{email}" class="form-control eh-input"
                 placeholder="yourname@gmail.com" required/>
        </div>
        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}"
             th:errors="*{email}"></div>
        <div class="form-hint">Must end with @gmail.com</div>
      </div>

      <div class="mb-3">
        <label class="form-label auth-label">Mobile Number</label>
        <div class="input-group eh-input-group">
          <span class="input-group-text"><i class="bi bi-phone"></i></span>
          <input type="tel" th:field="*{mobileNumber}" class="form-control eh-input"
                 placeholder="9429769132" maxlength="10" required/>
        </div>
        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('mobileNumber')}"
             th:errors="*{mobileNumber}"></div>
        <div class="form-hint">10 digits, starts with 6-9</div>
      </div>

      <div class="mb-4">
        <label class="form-label auth-label">Password</label>
        <div class="input-group eh-input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" th:field="*{password}" id="regPass" class="form-control eh-input"
                 placeholder="Min 6 characters" required/>
          <button type="button" class="input-group-text toggle-pass" onclick="togglePass('regPass')">
            <i class="bi bi-eye"></i>
          </button>
        </div>
        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}"
             th:errors="*{password}"></div>
      </div>

      <button type="submit" class="btn eh-btn-solid w-100 auth-submit">Create Account</button>
    </form>

    <div class="auth-divider"><span>Already have an account?</span></div>
    <a th:href="@{/auth/login}" class="btn eh-btn-outline-dark w-100">Login</a>
  </div>
</div>
<script>
function togglePass(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
