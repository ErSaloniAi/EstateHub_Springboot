<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Forgot Password')}"></head>
<body class="eh-body auth-body">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="text-center mb-4"><span style="font-size:2.5rem">🔐</span></div>
    <h2 class="auth-title text-center">Forgot Password?</h2>
    <p class="auth-sub text-muted text-center">Enter your Gmail to receive a reset link</p>

    <div th:if="${error}" class="alert eh-alert-error" th:text="${error}"></div>
    <div th:if="${success}" class="alert eh-alert-success" th:text="${success}"></div>

    <form th:action="@{/auth/forgot-password}" method="post" class="auth-form mt-4">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="mb-4">
        <label class="form-label auth-label">Gmail Address</label>
        <div class="input-group eh-input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control eh-input"
                 placeholder="yourname@gmail.com" required/>
        </div>
        <div class="form-hint">Must end with @gmail.com</div>
      </div>
      <button type="submit" class="btn eh-btn-solid w-100 auth-submit">Send Reset Link</button>
    </form>
    <div class="text-center mt-3">
      <a th:href="@{/auth/login}" class="auth-link">← Back to Login</a>
    </div>
  </div>
</div>
</body>
</html>
