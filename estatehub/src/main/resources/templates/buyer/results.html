<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Search Results')}"></head>
<body class="eh-body">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="page-hero-sm">
  <div class="container">
    <h1 class="page-hero-title" th:text="${title ?: 'Search Results'}"></h1>
    <p class="text-muted" th:text="${#lists.size(properties)} + ' properties found'"></p>
  </div>
</div>
<div class="container py-5">
  <div class="row g-4" th:if="${not #lists.isEmpty(properties)}">
    <div class="col-md-6 col-xl-4" th:each="prop : ${properties}">
      <div class="eh-property-card">
        <div class="property-img-wrap">
          <div class="property-img-placeholder">🏠</div>
          <div class="property-badge" th:text="${#strings.capitalize(prop.rName)}"></div>
        </div>
        <div class="property-body">
          <div class="property-price" th:text="'₹' + ${#numbers.formatDecimal(prop.rPrice, 0, 'COMMA', 0, 'POINT')}"></div>
          <div class="property-name" th:text="${#strings.capitalize(prop.rName)}"></div>
          <div class="text-muted small" th:text="${prop.rAddress}"></div>
          <div class="text-muted small mt-1"><i class="bi bi-arrows-angle-expand me-1"></i><span th:text="${prop.rArea}"></span></div>
          <a th:href="@{/properties/view/{id}(id=${prop.rId})}" class="btn eh-card-btn w-100 mt-3">View & Buy</a>
        </div>
      </div>
    </div>
  </div>
  <div th:if="${#lists.isEmpty(properties)}" class="text-center py-5">
    <div style="font-size:4rem">🔍</div>
    <h4 class="mt-3">No properties found</h4>
    <p class="text-muted" th:if="${maxPrice}">No properties under ₹<span th:text="${maxPrice}"></span> in <span th:text="${#strings.capitalize(city)}"></span></p>
    <a th:href="@{/buyer/browse}" class="btn eh-btn-outline-dark mt-2">Try Again</a>
  </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
