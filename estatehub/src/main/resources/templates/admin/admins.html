<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Admins')}"></head>
<body class="eh-body">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="dashboard-layout">
  <aside class="eh-sidebar">
    <div class="sidebar-user">
      <div class="sidebar-avatar" style="background:var(--gold)"><i class="bi bi-shield-fill text-dark"></i></div>
      <div class="sidebar-name">Admin Panel</div>
    </div>
    <nav class="sidebar-nav">
      <a th:href="@{/admin}" class="sidebar-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a th:href="@{/admin/admins}" class="sidebar-link active"><i class="bi bi-people"></i> Manage Admins</a>
      <a th:href="@{/admin/properties}" class="sidebar-link"><i class="bi bi-building"></i> Properties</a>
      <a th:href="@{/admin/properties/add}" class="sidebar-link"><i class="bi bi-plus-circle"></i> Add Property</a>
      <a th:href="@{/admin/sold}" class="sidebar-link"><i class="bi bi-bag-check"></i> Sold Properties</a>
      <a th:href="@{/admin/committed}" class="sidebar-link"><i class="bi bi-clock-history"></i> Committed</a>
      <a th:href="@{/admin/loans}" class="sidebar-link"><i class="bi bi-bank"></i> Loan Details</a>
      <a th:href="@{/admin/count-by-city}" class="sidebar-link"><i class="bi bi-bar-chart"></i> Count by City</a>
      <a th:href="@{/admin/contacts}" class="sidebar-link"><i class="bi bi-telephone"></i> Contacts</a>
      <a th:href="@{/admin/customers}" class="sidebar-link"><i class="bi bi-person-lines-fill"></i> Customers</a>
      <hr class="sidebar-divider"/>
      <form th:action="@{/auth/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="sidebar-link sidebar-logout"><i class="bi bi-box-arrow-right"></i> Logout</button>
      </form>
    </nav>
  </aside>
  <main class="dashboard-main">
    <div class="dash-header">
      <h1 class="dash-title">Manage Admins</h1>
      <div class="dash-sub text-muted">Admin.viewAdminData() — SELECT * FROM admin</div>
    </div>
    <div th:if="${success}" class="alert eh-alert-success mb-4" th:text="${success}"></div>
    <div th:if="${error}" class="alert eh-alert-error mb-4" th:text="${error}"></div>

    <!-- Add Admin Form — Admin.addAdminData() -->
    <div class="eh-card p-4 mb-4">
      <h5 class="fw-semibold mb-3"><i class="bi bi-person-plus me-2"></i>Add New Admin</h5>
      <form th:action="@{/admin/admins/add}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="row g-3">
          <div class="col-md-3">
            <input type="text" name="name" class="form-control eh-input" placeholder="Full Name" required/>
          </div>
          <div class="col-md-3">
            <input type="text" name="phone" class="form-control eh-input" placeholder="Phone Number" required/>
          </div>
          <div class="col-md-3">
            <input type="email" name="email" class="form-control eh-input" placeholder="Gmail Address" required/>
          </div>
          <div class="col-md-2">
            <input type="password" name="password" class="form-control eh-input" placeholder="Password" required/>
          </div>
          <div class="col-md-1">
            <button type="submit" class="btn eh-btn-solid w-100">Add</button>
          </div>
        </div>
      </form>
    </div>

    <!-- Admin List Table — fields: aid, aname, aphone, aemailid -->
    <div class="dash-section">
      <h5 class="dash-section-title">All Admins</h5>
      <div class="table-responsive">
        <table class="table eh-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Email</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="admin : ${admins}">
              <td th:text="${admin.aid}"></td>
              <td th:text="${admin.aName}"></td>
              <td th:text="${admin.aPhone}"></td>
              <td th:text="${admin.aEmailId}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(admins)}">
              <td colspan="4" class="text-center text-muted py-4">No admins found</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
