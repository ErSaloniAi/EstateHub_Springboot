# ============================================================
# ESTATEHUB — Production Profile
# Activate with: --spring.profiles.active=prod
# ============================================================

spring.datasource.url=jdbc:mysql://localhost:3307/real_estate?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.thymeleaf.cache=true

logging.level.com.estatehub=WARN
logging.level.org.springframework.security=WARN
logging.file.name=logs/estatehub.log

server.tomcat.max-threads=200
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json
