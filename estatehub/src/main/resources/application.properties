# ============================================================
# ESTATEHUB - Production Application Properties
# ============================================================

spring.application.name=estatehub

# ============================================================
# DATABASE CONFIGURATION
# Preserved from CreateConnection.java and Admin.java:
#   dbUrl = "jdbc:mysql://localhost:3307/real_estate"
#   dbUser = "root"
#   dbPass = ""
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3307/real_estate?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# EMAIL CONFIGURATION
# Preserved from GmailSender.java:
#   sender = "estatehub807@gmail.com"
#   appPassword = "bpbx wjuf vchc ylyv"
#   prop.put("mail.smtp.host", "smtp.gmail.com")
#   prop.put("mail.smtp.port", "587")
#   prop.put("mail.smtp.starttls.enable", "true")
#   prop.put("mail.smtp.ssl.protocols", "TLSv1.2")
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=estatehub807@gmail.com
spring.mail.password=bpbx wjuf vchc ylyv
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2

# ============================================================
# JWT CONFIGURATION
# ============================================================
app.jwt.secret=EstateHubSecretKey2024VeryLongSecretKeyForJWTTokenGeneration
app.jwt.expiration=86400000

# ============================================================
# FILE UPLOAD CONFIGURATION
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads/properties

# ============================================================
# SERVER
# ============================================================
server.port=8080
server.error.whitelabel.enabled=false

# ============================================================
# THYMELEAF
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ============================================================
# LOGGING
# ============================================================
logging.level.com.estatehub=INFO
logging.level.org.springframework.security=WARN
